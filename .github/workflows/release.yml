name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - name: Resolve release target
        id: target
        run: |
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
      - name: Require main unchanged
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          main_sha="$(git ls-remote https://github.com/nijanthan-dev/taxmate-australia.git refs/heads/main | awk '{print $1}')"
          if [ "$main_sha" != "$TARGET_SHA" ]; then
            echo "main moved from $TARGET_SHA to $main_sha."
            exit 1
          fi
      - name: Require release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "Set RELEASE_PLEASE_TOKEN to a token allowed to create release pull requests."
            exit 1
          fi
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
