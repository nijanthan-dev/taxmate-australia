name: Release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - name: Resolve release target
        id: target
        run: echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Require green CI
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          passed="$(gh run list --workflow CI --branch main --commit "$TARGET_SHA" --json conclusion,status --jq 'map(select(.status == "completed" and .conclusion == "success")) | length')"
          if [ "$passed" = "0" ]; then
            echo "No successful CI run found for $TARGET_SHA on main."
            exit 1
          fi
      - name: Require main unchanged
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [ "$main_sha" != "$TARGET_SHA" ]; then
            echo "main moved from $TARGET_SHA to $main_sha."
            exit 1
          fi
      - name: Require release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "Set RELEASE_PLEASE_TOKEN to a token allowed to create release pull requests."
            exit 1
          fi
      - uses: googleapis/release-please-action@c2a5a2bd6a758a0937f1ddb1e8950609867ed15c # v4.3.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
