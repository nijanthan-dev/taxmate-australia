name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m py_compile scripts/*.py
      - run: bash scripts/bootstrap-dev-env.sh
      - run: ./scripts/taxmate skills validate
      - run: ./scripts/taxmate validate
      - run: ./scripts/taxmate skills generate --check
      - run: ./scripts/taxmate skills audit --check
      - run: ./scripts/taxmate skills audit --format markdown --output "$RUNNER_TEMP/source-coverage.md"
      - run: bash scripts/test-skills-install.sh
      - run: scripts/check-publication-ready.sh
      - run: ./scripts/taxmate calc payg --gross-pay 1500 --periods 52 --tax-free-threshold
      - run: |
          cat > /tmp/taxmate-finance-sample.csv <<'CSV'
          date,description,amount,gst,owner,purpose,evidence,category,type
          2026-04-15,OpenAI Codex subscription,33.00,3.00,owner,ABN app development,invoice,software,expense
          2026-05-10,Private health premium,220.00,0.00,joint,private health statement,statement,private_health,record
          CSV
          ./scripts/taxmate finance --input /tmp/taxmate-finance-sample.csv --format json >/tmp/taxmate-finance-review.json

  plugin-package:
    name: Plugin Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: test -f .codex-plugin/plugin.json
      - run: test -f hooks.json
      - run: test -f scripts/clean-source-cache.sh
      - run: test -f scripts/codex-env-setup.sh
      - run: test -f scripts/codex-env-cleanup.sh
      - run: test -f scripts/codex-env-full-check.sh
      - run: test -f scripts/codex-cloud-post-task-cleanup.sh
      - run: bash -n scripts/codex-env-setup.sh
      - run: bash -n scripts/codex-env-cleanup.sh
      - run: bash -n scripts/codex-env-full-check.sh
      - run: bash -n scripts/codex-cloud-post-task-cleanup.sh
      - run: bash -n scripts/test-codex-env-cleanup.sh
      - run: bash -n scripts/test-codex-env-setup-clean.sh
      - run: bash scripts/test-codex-env-cleanup.sh
      - run: bash scripts/test-codex-env-setup-clean.sh
      - run: test -f data/ato_knowledge_base/source_registry.json
      - run: test -f data/ato_knowledge_base/source_coverage.json
      - run: test -f config/public-skills.json
      - run: test -f config/skill-packaging.json
      - run: test ! -d migration
      - run: test ! -f data/ato_knowledge_base/source_index.json
      - run: test ! -f data/ato_knowledge_base/source_manifest.json
      - run: test ! -f data/ato_knowledge_base/migration_report.json
      - run: test -f skills/taxmate-australia/SKILL.md
      - run: test -f skills/capital-gains-tax/SKILL.md
      - run: test -f skills/gst-bas/SKILL.md
      - run: test -f skills/workbook/SKILL.md
      - run: test -f skills/taxpack/SKILL.md
      - run: test ! -d data/ato_knowledge_base/raw
      - run: test ! -d data/ato_knowledge_base/text
      - run: bash scripts/test-skills-install.sh
      - run: bash scripts/clean-source-cache.sh
      - run: bash scripts/check-publication-ready.sh
      - run: "! git grep -nE 'public[-]work|taxmate-australia-public[-]work' -- . ':!data/ato_knowledge_base/raw/**' ':!data/ato_knowledge_base/text/**'"
      - run: "! git grep -nE '/Users/[[:alnum:]_.-]+|custom[_]apps/skills[_]and[_]plugins|Developer/custom[_]apps' -- README.md .codex-plugin agents skills docs"
      - run: "! git ls-files 'bin/*' | grep -q ."

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
