name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: hol-plugin-scanner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: HOL Plugin Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@64aaac62f076ec9786062afdd34b72b0bb6ed99e # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
