name: Bug report
description: Report a reproducible TaxMate Australia issue
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, using synthetic data only.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use synthetic data only. Do not include private tax records.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Area
      options:
        - Runtime
        - Generated skill
        - Finance review
        - Calculator
        - Source registry or coverage
        - Plugin packaging
        - CI or repo validation check
        - Documentation
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation run
      description: Paste command names and results. Do not paste secrets or private records.
    validations:
      required: false
